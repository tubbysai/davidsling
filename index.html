'use strict';
// constants

// level data
const levels=[{name:'Faith Over Fear',targets:['FEAR','WORRY','DOUBT'],stones:['FAITH','PRAYER','TRUST'],verse:'“When I am afraid, I put my trust in You.” — Psalm 56:3',msg:'Faith helps brave hearts stand tall.'},{name:'Truth Over Lies',targets:['LIES','CONFUSION','DECEPTION'],stones:['TRUTH','WORD','LIGHT'],verse:'“Your word is truth.” — John 17:17',msg:'God’s truth shines bright and clear.'},{name:'Humility Over Pride',targets:['PRIDE','BOASTING','SELFISHNESS'],stones:['HUMILITY','KINDNESS','LOVE'],verse:'“God opposes the proud but gives grace to the humble.” — James 4:6',msg:'Kind hearts are strong hearts.'},{name:'Courage Over Temptation',targets:['TEMPTATION','SIN','SHORTCUTS'],stones:['COURAGE','OBEDIENCE','PRAYER'],verse:'“Resist the devil, and he will flee from you.” — James 4:7',msg:'Courage chooses what is right.'},{name:'The Battle Is the Lord’s',targets:['FEAR','LIES','PRIDE','TEMPTATION','SIN'],stones:['FAITH','TRUTH','COURAGE','PRAYER','LOVE'],verse:'“The battle is the Lord’s.” — 1 Samuel 17:47',msg:'With God, strongholds can fall.'}];
// game state
let state='menu',levelIndex=0,stoneIndex=0,bodies=[],targets=[],stones=[],currentStone=null,aiming=false,pull={x:SLING.x,y:SLING.y},buttons=[],particles=[],sparkles=[],clouds=[{x:120,y:95,s:1},{x:450,y:125,s:.8},{x:860,y:80,s:1.1}],won=false,gameOver=false,celebrate=0;
// helpers
function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b,c,d){return Math.hypot(a-c,b-d)}function screenToWorld(e){return{x:(e.clientX-offsetX)/scale,y:(e.clientY-offsetY)/scale}}function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}function text(t,x,y,size,color='#4b2a15',align='center'){ctx.fillStyle=color;ctx.font=`800 ${size}px Georgia,serif`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.lineWidth=4;ctx.strokeStyle='rgba(255,248,220,.75)';ctx.strokeText(t,x,y);ctx.fillText(t,x,y)}
// physics creation
function add(b){bodies.push(b);World.add(engine.world,b);return b}function resetLevel(i=levelIndex){World.clear(engine.world);bodies=[];targets=[];stones=[];particles=[];sparkles=[];currentStone=null;aiming=false;won=false;gameOver=false;celebrate=0;levelIndex=i;stoneIndex=0;state='play';add(Bodies.rectangle(640,690,1500,90,{isStatic:true,gameType:'ground'}));add(Bodies.rectangle(980,615,430,38,{isStatic:true,gameType:'platform'}));let L=levels[i],baseX=i<4?930:870,gap=86;L.targets.forEach((w,n)=>{let col=n%3,row=Math.floor(n/3),x=baseX+col*gap+(row%2)*40,y=570-row*92;let b=add(Bodies.rectangle(x,y,76,w.length>8?54:64,64,{gameType:'target',word:w,label:w,density:.004,friction:.62,restitution:.08}));b.origin={x,y};targets.push(b); if(n< L.targets.length-1) add(Bodies.rectangle(x+43,y-52,18,112,{gameType:'wood',word:'',density:.003,friction:.55}));});loadNextStone()}
function loadNextStone(){if(currentStone) return;let L=levels[levelIndex];if(stoneIndex>=L.stones.length){setTimeout(()=>{if(!won&&state==='play'){gameOver=true;state='over'}},900);return}currentStone=add(Bodies.circle(SLING.x,SLING.y,23,{gameType:'stone',word:L.stones[stoneIndex],density:.03,restitution:.25,friction:.45}));currentStone.isLoaded=true;Body.setVelocity(currentStone,{x:0,y:0})}

// input
canvas.addEventListener('pointerdown',e=>{e.preventDefault();let p=screenToWorld(e),hit=buttons.find(b=>p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h);if(hit){hit.action();return}if(state==='play'&&currentStone&&currentStone.isLoaded&&dist(p.x,p.y,SLING.x,SLING.y)<105){aiming=true;pull=p;canvas.setPointerCapture(e.pointerId)}});canvas.addEventListener('pointermove',e=>{if(!aiming)return;e.preventDefault();let p=screenToWorld(e),dx=p.x-SLING.x,dy=p.y-SLING.y,d=Math.hypot(dx,dy);if(d>MAX_PULL){dx=dx/d*MAX_PULL;dy=dy/d*MAX_PULL}pull={x:SLING.x+dx,y:SLING.y+dy};if(currentStone)Body.setPosition(currentStone,pull)});canvas.addEventListener('pointerup',e=>{if(!aiming)return;e.preventDefault();aiming=false;if(!currentStone)return;let vx=(SLING.x-pull.x)*POWER,vy=(SLING.y-pull.y)*POWER;currentStone.isLoaded=false;Body.setVelocity(currentStone,{x:vx,y:vy});burst(SLING.x,SLING.y,14,'#eac17a')});
// collisions feedback
Events.on(engine,'collisionStart',ev=>ev.pairs.forEach(p=>{let a=p.bodyA,b=p.bodyB,impact=Math.hypot(a.velocity.x-b.velocity.x,a.velocity.y-b.velocity.y);if(impact>2.2){burst((a.position.x+b.position.x)/2,(a.position.y+b.position.y)/2,10,'#d4a264');shake=Math.min(12,shake+impact*.7)}}));
function burst(x,y,n,col){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-2,2),vy:rnd(-3,.5),life:rnd(25,55),r:rnd(2,6),c:col})}function sparkle(x,y){for(let i=0;i<18;i++)sparkles.push({x,y,vx:rnd(-2.4,2.4),vy:rnd(-2.8,1.5),life:rnd(35,70),r:rnd(2,4)})}
// drawing
function background(t){let g=ctx.createLinearGradient(0,0,0,WORLD_H);g.addColorStop(0,'#f9b867');g.addColorStop(.48,'#ffd98c');g.addColorStop(1,'#d98d45');ctx.fillStyle=g;ctx.fillRect(0,0,WORLD_W,WORLD_H);ctx.fillStyle='rgba(255,244,177,.35)';for(let r=60;r<360;r+=55){ctx.beginPath();ctx.arc(1020,145,r,0,Math.PI*2);ctx.fill()}clouds.forEach(c=>{c.x=(c.x+.012*(1+c.s))%1400;drawCloud(c.x,c.y,c.s);drawCloud(c.x-1400,c.y,c.s)});ctx.fillStyle='#bf7542';ctx.beginPath();ctx.moveTo(0,520);for(let x=0;x<=1280;x+=90)ctx.lineTo(x,500+Math.sin(x*.012)*35);ctx.lineTo(1280,720);ctx.lineTo(0,720);ctx.fill();ctx.fillStyle='#e9b86b';ctx.fillRect(0,GROUND_Y,WORLD_W,90);ctx.fillStyle='#b98245';ctx.fillRect(760,596,440,50)}function drawCloud(x,y,s){ctx.fillStyle='rgba(255,245,220,.75)';ctx.beginPath();ctx.ellipse(x,y,55*s,24*s,0,0,7);ctx.ellipse(x+40*s,y+4*s,45*s,22*s,0,0,7);ctx.ellipse(x-35*s,y+5*s,38*s,19*s,0,0,7);ctx.fill()}
function drawDavid(t){let bob=Math.sin(t*.004)*4+(celebrate?Math.sin(t*.03)*14:0),x=145,y=505+bob;ctx.save();ctx.translate(x,y);ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(0,88,55,12,0,0,7);ctx.fill();ctx.fillStyle='#8f5528';ctx.fillRect(-29,32,16,55);ctx.fillRect(15,32,16,55);ctx.fillStyle='#5b321b';ctx.fillRect(-38,84,28,9);ctx.fillRect(10,84,28,9);ctx.fillStyle='#63a66f';roundRect(ctx,-40,-7,80,62,20);ctx.fill();ctx.fillStyle='#e7a66d';ctx.beginPath();ctx.arc(0,-45,36,0,7);ctx.fill();ctx.fillStyle='#5b321b';for(let i=0;i<9;i++){ctx.beginPath();ctx.arc(-34+i*8,-72+Math.sin(i)*8,13,0,7);ctx.fill()}ctx.fillStyle='#3a2417';ctx.beginPath();ctx.arc(-12,-47,3,0,7);ctx.arc(13,-47,3,0,7);ctx.fill();ctx.strokeStyle='#7b321b';ctx.lineWidth=3;ctx.beginPath();ctx.arc(2,-35,11,0,Math.PI);ctx.stroke();ctx.strokeStyle='#e7a66d';ctx.lineWidth=15;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-36,4);ctx.lineTo(-75,20);ctx.moveTo(36,4);ctx.lineTo(72,aiming?-20:12);ctx.stroke();ctx.restore()}
function drawSling(){ctx.strokeStyle='#6d3d21';ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(198,397);ctx.lineTo(aiming?pull.x:SLING.x,aiming?pull.y:SLING.y);ctx.moveTo(214,397);ctx.lineTo(aiming?pull.x:SLING.x,aiming?pull.y:SLING.y);ctx.stroke();ctx.fillStyle='#8b5a2b';ctx.beginPath();ctx.ellipse(aiming?pull.x:SLING.x,aiming?pull.y:SLING.y,28,15,0,0,7);ctx.fill()}
function drawBody(b){ctx.save();ctx.translate(b.position.x,b.position.y);ctx.rotate(b.angle);if(b.gameType==='stone'){let g=ctx.createRadialGradient(-8,-10,4,0,0,b.r);g.addColorStop(0,'#f6e5b4');g.addColorStop(1,'#9d835e');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,b.r,0,7);ctx.fill();text(b.word,0,0,b.word.length>6?12:14,'#4b351e')}else if(b.gameType==='target'||b.gameType==='wood'){let w=b.w,h=b.h;let g=ctx.createLinearGradient(0,-h/2,0,h/2);g.addColorStop(0,b.gameType==='target'?'#d88b55':'#bb7a38');g.addColorStop(1,b.gameType==='target'?'#9f563a':'#7a481f');ctx.fillStyle=g;roundRect(ctx,-w/2,-h/2,w,h,12);ctx.fill();ctx.strokeStyle='#6a351d';ctx.lineWidth=4;ctx.stroke();if(b.word)text(b.word,0,0,b.word.length>9?13:17,'#fff2c2')}ctx.restore()}
function drawTrajectory(){if(!aiming)return;let vx=(SLING.x-pull.x)*POWER,vy=(SLING.y-pull.y)*POWER,x=pull.x,y=pull.y;ctx.fillStyle='rgba(255,255,230,.8)';for(let i=0;i<24;i++){let tt=i*5.5,px=x+vx*tt,py=y+vy*tt+.5*.88*.00115*tt*tt*16;ctx.globalAlpha=1-i/28;ctx.beginPath();ctx.arc(px,py,4,0,7);ctx.fill()}ctx.globalAlpha=1}
function button(label,x,y,w,h,action){buttons.push({label,x,y,w,h,action});let g=ctx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,'#c9863e');g.addColorStop(1,'#86501f');ctx.fillStyle=g;roundRect(ctx,x,y,w,h,14);ctx.fill();ctx.strokeStyle='#5e3519';ctx.lineWidth=4;ctx.stroke();text(label,x+w/2,y+h/2,Math.min(28,h*.42),'#fff0bd')}
function panel(x,y,w,h){ctx.fillStyle='rgba(89,52,29,.28)';roundRect(ctx,x+8,y+10,w,h,24);ctx.fill();ctx.fillStyle='#fff0c8';roundRect(ctx,x,y,w,h,24);ctx.fill();ctx.strokeStyle='#b9782c';ctx.lineWidth=5;ctx.stroke()}
function hud(){panel(25,20,725,70);let L=levels[levelIndex];text(`Level ${levelIndex+1}: ${L.name}`,55,55,26,'#553015','left');text(`Stones left: ${Math.max(0,L.stones.length-stoneIndex)}`,1030,42,25,'#553015');text(`Stone: ${currentStone?currentStone.word:'—'}`,1030,76,21,'#553015');button('Restart',900,22,135,52,()=>resetLevel());button('Menu',1050,22,110,52,()=>{state='menu';World.clear(engine.world);bodies=[]})}
function menu(){panel(330,95,620,420);text('David’s Sling',640,175,58,'#6b3717');text('Stones of Faith',640,235,37,'#9d5a24');text('Launch stones of faith to knock down fear, lies, and temptation.',640,305,24,'#5b361d');button('Play on Computer',485,370,310,70,()=>resetLevel(0));text('Mouse or touch: drag, aim, and release.',640,475,22,'#6b4a2a')}
function modal(kind){ctx.fillStyle='rgba(45,28,25,.45)';ctx.fillRect(0,0,WORLD_W,WORLD_H);panel(350,145,580,390);let L=levels[levelIndex];if(kind==='win'){text('Great job!',640,220,48,'#6a3719');text(L.msg,640,282,25,'#553015');text(L.verse,640,342,21,'#553015');button(levelIndex===levels.length-1?'Menu':'Next Level',470,435,165,62,()=>levelIndex===levels.length-1?(state='menu') : resetLevel(levelIndex+1));button('Replay',660,435,150,62,()=>resetLevel(levelIndex))}else{text('Try again!',640,240,48,'#6a3719');text('Take heart—choose a stone and try another brave shot!',640,315,23,'#553015');button('Restart Level',535,410,210,65,()=>resetLevel(levelIndex))}}
function update(dt,t){if(state==='play'){Engine.update(engine,Math.min(dt,33));targets.forEach(b=>{if(b.defeated)return;let tipped=Math.abs(b.angle)>1.13;if(tipped)b.tipTime+=dt;let defeated=b.position.y>675||Math.abs(b.position.x-b.origin.x)>210||b.tipTime>450;if(defeated){b.defeated=true;sparkle(b.position.x,b.position.y)}});if(targets.length&&targets.every(b=>b.defeated)&&!won){won=true;state='win';celebrate=1;sparkle(960,420)}if(currentStone&&!currentStone.isLoaded&&!aiming){let s=Math.hypot(currentStone.velocity.x,currentStone.velocity.y);if(currentStone.position.x>1360||currentStone.position.y>760||currentStone.life>8500||(currentStone.life>1300&&s<.12))removeStone()}}particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});particles=particles.filter(p=>p.life>0);sparkles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.life--});sparkles=sparkles.filter(p=>p.life>0);shake*=.88}
function draw(t){buttons=[];ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#23172d';ctx.fillRect(0,0,innerWidth,innerHeight);ctx.translate(offsetX,offsetY);ctx.scale(scale,scale);let sx=shake?rnd(-shake,shake):0,sy=shake?rnd(-shake,shake):0;ctx.save();ctx.translate(sx,sy);background(t);bodies.forEach(b=>{if(!b.isStatic)drawBody(b)});drawTrajectory();drawSling();drawDavid(t);particles.forEach(p=>{ctx.globalAlpha=p.life/55;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill()});sparkles.forEach(p=>{ctx.globalAlpha=p.life/70;ctx.fillStyle='#fff7a8';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill()});ctx.globalAlpha=1;if(state==='play')hud();ctx.restore();if(state==='menu')menu();if(state==='win')modal('win');if(state==='over')modal('over')}
function loop(t){let dt=t-last||16;last=t;update(dt,t);draw(t);requestAnimationFrame(loop)}
// resize handling
function resize(){dpr=Math.min(2.5,window.devicePixelRatio||1);canvas.width=Math.round(innerWidth*dpr);canvas.height=Math.round(innerHeight*dpr);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';scale=Math.min(innerWidth/WORLD_W,innerHeight/WORLD_H);offsetX=(innerWidth-WORLD_W*scale)/2;offsetY=(innerHeight-WORLD_H*scale)/2}addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,80));document.addEventListener('gesturestart',e=>e.preventDefault());resize();requestAnimationFrame(loop);
</script></body></html>
